server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: pet-recovery-server
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_recovery?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mail:
    host: smtp.163.com
    port: 465
    username: b1196530136@163.com
    password: DTcnwuLj2yYffyPD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false # 使用 SSL 时，通常不需要开启 STARTTLS
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory # 启用 SSL 加密连接
            port: 465
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          debug: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.petrecovery.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT Configuration
jwt:
  secret: pet-recovery-secret-key-change-in-production
  expiration: 86400000

# File Upload Storage
upload:
  storage:
    type: local
  local:
    path: ./upload
    max-file-size: 5242880
