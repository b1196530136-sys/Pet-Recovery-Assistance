server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: pet-recovery-server
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_recovery?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mail:
    host: smtp.163.com
    port: 465
    username: b1196530136@163.com
    password: DTcnwuLj2yYffyPD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false # 使用 SSL 时，通常不需要开启 STARTTLS
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory # 启用 SSL 加密连接
            port: 465
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          debug: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.petrecovery.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT Configuration
jwt:
  secret: pet-recovery-secret-key-change-in-production
  expiration: 86400000

# File Upload Storage
upload:
  storage:
    type: local
  local:
    path: ./upload
    max-file-size: 5242880

# 快瞳宠物图像相似度对比接口配置
# 接口文档: https://ai.inspirvision.cn/s/api/recognitionComparedFromPath
pet-recognition:
  api-url: https://ai.inspirvision.cn/s/api/recognitionComparedFromPath
  # Token获取接口: https://ai.inspirvision.cn/s/api/getAccessToken
  token-url: https://ai.inspirvision.cn/s/api/getAccessToken
  # 快瞳官网注册后获取的 accessKey 和 accessSecret
  access-key: APPID_02KS011b7cH29GsS
  access-secret: 9991fe02f2541e432b2910b62ac3ed42
  # recogType: 0=鼻子(局部特征), 1=正脸
  recog-type: 1
  # petType: 0=狗, 1=猫
  default-pet-type: 0
  # 相似度阈值（confidence范围0~100，越高越相似）
  similarity-threshold: 60

# 免费图床配置（用于以图搜宠：将本地图片上传获取公网URL后传给快瞳API）
# ImgBB免费注册获取API Key: https://imgbb.com/api
image-hosting:
  provider: imgbb
  imgbb:
    api-url: https://api.imgbb.com/1/upload
    api-key: 9fec137da23ad3b1cf4263d14ab74e24
    # 图片过期时间（秒），0=永不过期，86400=1天，604800=7天
    expiration: 604800

